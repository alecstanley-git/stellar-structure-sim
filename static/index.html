<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Structure Simulator</title>
    <meta name="description" content="A real-time stellar structure and evolution simulator interface.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(25, 33, 50, 0.6);
            --border-color: rgba(60, 75, 105, 0.4);
            --primary: #4ade80;
            --primary-glow: rgba(74, 222, 128, 0.3);
            --secondary: #60a5fa;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #111827, var(--bg-color));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .container {
            display: flex;
            flex: 1;
            padding: 2rem;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .sidebar {
            flex: 0 0 350px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-glow);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), #22c55e);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            min-width: 0;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0.5rem 0;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                flex: none;
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Stellar Simulator Engine</h1>
    </header>

    <div class="container">
        <div class="sidebar">
            <div class="panel">
                <h2>Parameters</h2>
                <div class="input-group">
                    <label for="mass">Initial Mass (M☉)</label>
                    <input type="number" id="mass" value="1.0" step="0.1" min="0.1" max="100">
                </div>
                <div class="input-group">
                    <label for="x">Hydrogen Fraction (X)</label>
                    <input type="number" id="x" value="0.70" step="0.01" min="0" max="1">
                </div>
                <div class="input-group">
                    <label for="z">Metallicity (Z)</label>
                    <input type="number" id="z" value="0.02" step="0.001" min="0" max="0.1">
                </div>
                <button id="runBtn" onclick="runSimulation()">Run Simulation</button>
                <div id="loading" style="text-align: center; margin-top: 1rem; display: none;">
                    <div class="loader"></div>
                    <p style="color: var(--text-muted); margin-top: 0.5rem;">Solving Henyey equations...</p>
                </div>
            </div>

            <div class="panel" id="finalStats" style="display: none;">
                <h2>Final State</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label">Age</div>
                        <div class="value" id="valAge">-</div>
                        <div class="label">Gyr</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Luminosity</div>
                        <div class="value" id="valL">-</div>
                        <div class="label">L☉</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Radius</div>
                        <div class="value" id="valR">-</div>
                        <div class="label">R☉</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <h2>HR Diagram (Evolution Track)</h2>
                <div class="chart-container">
                    <canvas id="hrChart"></canvas>
                </div>
            </div>

            <div class="charts-grid">
                <div class="panel">
                    <h2>Core Temperature vs Time</h2>
                    <div class="chart-container">
                        <canvas id="tcChart"></canvas>
                    </div>
                </div>
                <div class="panel">
                    <h2>Core Hydrogen vs Time</h2>
                    <div class="chart-container">
                        <canvas id="xChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Outfit', sans-serif";
        Chart.defaults.scale.grid.color = 'rgba(60, 75, 105, 0.2)';

        let hrChart, tcChart, xChart;

        function initCharts() {
            const hrCtx = document.getElementById('hrChart').getContext('2d');
            hrChart = new Chart(hrCtx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Evolution Track',
                        data: [],
                        borderColor: '#4ade80',
                        backgroundColor: 'rgba(74, 222, 128, 0.2)',
                        borderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { type: 'linear', position: 'bottom', title: { display: true, text: 'Core Temperature (K) [Proxy for Teff]' } },
                        y: { title: { display: true, text: 'Luminosity (L☉)' } }
                    }
                }
            });

            const tcCtx = document.getElementById('tcChart').getContext('2d');
            tcChart = new Chart(tcCtx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Core Temp', data: [], borderColor: '#f87171', tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { title: { display: true, text: 'T_c (K)' } }, x: { title: { display: true, text: 'Age (Gyr)' } } } }
            });

            const xCtx = document.getElementById('xChart').getContext('2d');
            xChart = new Chart(xCtx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Core H', data: [], borderColor: '#60a5fa', tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, title: { display: true, text: 'X_core' } }, x: { title: { display: true, text: 'Age (Gyr)' } } } }
            });
        }

        async function runSimulation() {
            const btn = document.getElementById('runBtn');
            const loader = document.getElementById('loading');
            
            btn.style.display = 'none';
            loader.style.display = 'block';

            const mass = document.getElementById('mass').value;
            const x = document.getElementById('x').value;
            const z = document.getElementById('z').value;

            try {
                const response = await fetch(`/simulate?mass=${mass}&x=${x}&z=${z}`);
                const res = await response.json();
                
                if (res.status === 'success') {
                    updateDashboard(res.data);
                } else {
                    alert('Simulation failed: ' + res.message);
                }
            } catch (err) {
                alert('Request failed: ' + err);
            } finally {
                btn.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        function updateDashboard(data) {
            // Update charts
            const ages = data.map(d => d.age_gyr.toFixed(2));
            
            // HR Diagram (Using Tc proxy for Teff since Teff is not directly in StateRecord right now)
            // But usually HR is log Teff vs log L. We just plot Tc vs L for now as a proxy structure tracker
            hrChart.data.datasets[0].data = data.map(d => ({ x: d.tc_k, y: d.l_lsun }));
            hrChart.update();

            tcChart.data.labels = ages;
            tcChart.data.datasets[0].data = data.map(d => d.tc_k);
            tcChart.update();

            xChart.data.labels = ages;
            xChart.data.datasets[0].data = data.map(d => d.x_core);
            xChart.update();

            // Update stats
            const last = data[data.length - 1];
            document.getElementById('finalStats').style.display = 'block';
            document.getElementById('valAge').innerText = last.age_gyr.toFixed(1);
            document.getElementById('valL').innerText = last.l_lsun.toFixed(2);
            document.getElementById('valR').innerText = last.r_rsun.toFixed(2);
        }

        window.onload = initCharts;
    </script>
</body>
</html>
